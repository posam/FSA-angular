<div class="b-section-headline">
  <div class="container">
    <header class="mb-6">
      <div class="row align-items-center">
        <div class="col">
          <h2 class="fw-bold m-0">Questions</h2>
        </div>
      </div>
    </header>

    <div class="card">
      <input type="text" class="form-control" placeholder="Search">
    </div>
  </div>
</div>

<app-section-container>
  <header class="mb-4">
    <div class="row align-items-center">
      <div class="col">
        <h2 class="fw-bold m-0">All questions</h2>
      </div>
    </div>
  </header>

  @for (msg of messages(); track msg.id){
    <app-message [message]="msg"></app-message>
  }

  <div class="mt-8 text-end">
    <button type="button" class="text-uppercase fw-bold text-decoration-none e-icon-link e-icon-link--action"
            (click)="onNewQuestionClick()">
      <i class="zmdi zmdi-plus"></i>
      New question
    </button>
  </div>


</app-section-container>
