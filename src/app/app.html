
<nav class="navbar navbar-expand-lg bg-white">
  <div class="container-fluid">
    <button class="navbar-toggler" type="button"
            aria-controls="navbarToggler" [attr.aria-expanded]="!collapsed" aria-label="Toggle navigation"
            (click)="collapsed = !collapsed">
      <span class="navbar-toggler-icon"></span>
    </button>


    <a class="navbar-brand" routerLink="/">
      <img src="/images/logo.svg" alt="Logo" width="48" height="48">
    </a>

    <div class="navbar-collapse" [class.collapse]="collapsed"
         id="navbarToggler">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link"
             routerLink="home" routerLinkActive="active"
          ><i class="zmdi zmdi-home"></i> Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link"
             routerLink="counter" routerLinkActive="active"
          ><i class="zmdi zmdi-n-1-square"></i> Counter</a>
        </li>
      </ul>
    </div>

    @if (user(); as user) {
      <div ngbDropdown class="mt-lg-4" [title]="user.name">
        <button class="e-user" type="button" ngbDropdownToggle>
          {{ user.name | initials }}
        </button>

        <div ngbDropdownMenu>
          <button type="button" class="dropdown-item" [class.disabled]="true" aria-disabled="true">{{ user.name }}</button>
          <button type="button" class="dropdown-item" (click)="logout()">Logout</button>
        </div>
      </div>
    } @else {
      <button class="e-user" type="button" (click)="login()">
        Login
      </button>
    }


  </div>
</nav>

<router-outlet></router-outlet>
