<div class="b-section-headline">
  <div class="container">
    <header>
      <div class="row align-items-center">
        <div class="col">
          <h2 class="fw-bold m-0">Home</h2>
        </div>
      </div>
    </header>
  </div>
</div>

<app-section-container>
  <header class="mb-4">
    <div class="row align-items-center">
      <div class="col">
        <h2 class="fw-bold m-0">Latest questions</h2>
      </div>
      <div class="col-auto">
        <a href="#" title="#" class="text-uppercase fw-bold text-decoration-none" routerLink="/questions">See all</a>
      </div>
    </div>
  </header>

  @for (msg of messages(); track msg.id){
    <app-message [message]="msg"></app-message>
  }

</app-section-container>
