<div class="b-section-headline">
  <div class="container">
    <header class="mb-6">
      <div class="row align-items-center">
        <div class="col">
          <h2 class="fw-bold m-0">Home</h2>
        </div>
      </div>
    </header>

    <div class="card">
      <input type="text" class="form-control" placeholder="Search">
    </div>
  </div>
</div>

<app-section-container>
  <header class="mb-4">
    <div class="row align-items-center">
      <div class="col">
        <h2 class="fw-bold m-0">Latest questions</h2>
      </div>
      <div class="col-auto">
        <a href="#" title="#" class="text-uppercase fw-bold text-decoration-none">See all</a>
      </div>
    </div>
  </header>

  @for (msg of messages$ | async; track msg.id){
    <div class="card mb-3">
      <div class="card-body">
        <div class="row align-items-center">
          <div class="col">
            <span class="badge rounded-pill text-bg-violet">{{msg.name}}</span>
          </div>
          <div class="col-auto">
            <small class="text-body-secondary">{{ msg.created | date: 'fullDate'}}</small>
          </div>
        </div>
        <p class="card-text fw-bold mb-4 mt-3">{{msg.message}}</p>
        <p class="card-text"><small class="text-body-secondary">Question by: {{msg.createdBy?.name}}</small></p>
      </div>
    </div>
  }

</app-section-container>
